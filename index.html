<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>IPTV-Premium</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet"/>
<script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#050810;--s1:#0a0e1a;--s2:#0e1422;--s3:#121830;
  --border:#182036;--border2:#1e2a42;
  --a:#f5c518;--a2:#e74c3c;--a3:#2ecc71;--a-dim:rgba(245,197,24,.12);
  --text:#ffffff;--text2:#a0aec0;--text3:#4a5568;
  --r:10px;--r-sm:7px;--r-lg:14px;
  --shadow:0 8px 32px rgba(0,0,0,.6);
  --t:.2s cubic-bezier(.2,.8,.3,1);
}
html,body{height:100%;overflow:hidden}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--text)}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}

/* ── SCREENS ── */
.screen{display:none;flex-direction:column;height:100vh;width:100vw}
.screen.active{display:flex}

/* ══════════════════════════════════════════════
   CONNECT SCREEN
══════════════════════════════════════════════ */
#s-connect{align-items:center;justify-content:center;background:radial-gradient(ellipse at 50% 0%,#1a1040 0%,var(--bg) 70%)}
.connect-wrap{width:100%;max-width:480px;padding:24px}
.connect-logo{display:flex;align-items:center;gap:12px;margin-bottom:36px;justify-content:center}
.connect-logo-icon{width:48px;height:48px;border-radius:14px;background:linear-gradient(135deg,var(--a),#e67e22);display:flex;align-items:center;justify-content:center;font-size:24px;box-shadow:0 0 30px rgba(245,197,24,.3)}
.connect-logo-name{font-size:22px;font-weight:800;letter-spacing:2px;color:var(--a)}
.connect-title{font-size:26px;font-weight:800;text-align:center;margin-bottom:6px}
.connect-sub{font-size:13px;color:var(--text2);text-align:center;margin-bottom:28px;line-height:1.6}
.type-tabs{display:flex;background:var(--s1);border:1px solid var(--border);border-radius:var(--r);padding:4px;gap:4px;margin-bottom:20px}
.type-tab{flex:1;padding:8px;border-radius:var(--r-sm);border:none;background:transparent;color:var(--text2);font-family:'Outfit',sans-serif;font-size:12px;font-weight:600;cursor:pointer;transition:all var(--t);text-align:center}
.type-tab.active{background:var(--a);color:#000}
.type-tab:not(.active):hover{color:var(--text);background:var(--s2)}
.c-form{background:var(--s1);border:1px solid var(--border);border-radius:var(--r-lg);padding:22px;display:flex;flex-direction:column;gap:14px}
.field label{display:block;font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--text3);margin-bottom:5px}
.field input{width:100%;background:var(--s2);border:1px solid var(--border);border-radius:var(--r-sm);color:var(--text);font-family:'DM Mono',monospace;font-size:13px;padding:10px 13px;outline:none;transition:all var(--t)}
.field input:focus{border-color:var(--a);box-shadow:0 0 0 3px rgba(245,197,24,.12)}
.field input::placeholder{color:var(--text3)}
.row2{display:grid;grid-template-columns:2fr 1fr;gap:10px}
.hr{height:1px;background:var(--border)}
.btn-main{width:100%;padding:13px;border-radius:var(--r-sm);border:none;background:linear-gradient(135deg,var(--a),#e67e22);color:#000;font-family:'Outfit',sans-serif;font-size:14px;font-weight:800;cursor:pointer;transition:all var(--t);letter-spacing:.5px}
.btn-main:hover{transform:translateY(-1px);box-shadow:0 6px 24px rgba(245,197,24,.35)}
.btn-main:disabled{opacity:.5;cursor:not-allowed;transform:none}
.log-box{background:var(--bg);border:1px solid var(--border);border-radius:var(--r-sm);padding:10px;overflow-y:auto;display:flex;flex-direction:column;gap:2px;font-family:'DM Mono',monospace;font-size:11px;height:80px}
.log-row{display:flex;gap:8px;line-height:1.5}
.lt{color:var(--text3);flex-shrink:0}.li{color:#60a5fa}.lo{color:var(--a3)}.le{color:var(--a2)}
.prog-bar{height:3px;background:var(--border);border-radius:2px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--a),var(--a3));width:0;transition:width .4s ease}

/* ══════════════════════════════════════════════
   MAIN APP SCREEN
══════════════════════════════════════════════ */
#s-app{overflow:hidden}

/* TOP NAV */
.topnav{height:56px;background:rgba(5,8,16,.9);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 24px;gap:0;flex-shrink:0;position:relative;z-index:50}
.nav-logo{display:flex;align-items:center;gap:9px;margin-right:28px}
.nav-logo-ico{width:28px;height:28px;border-radius:8px;background:linear-gradient(135deg,var(--a),#e67e22);display:flex;align-items:center;justify-content:center;font-size:14px}
.nav-logo-txt{font-size:14px;font-weight:800;letter-spacing:1.5px;color:var(--a)}
.nav-tabs{display:flex;align-items:stretch;height:56px;gap:0}
.nav-tab{display:flex;align-items:center;padding:0 18px;font-size:14px;font-weight:600;color:var(--text2);cursor:pointer;border-bottom:3px solid transparent;transition:all var(--t);white-space:nowrap}
.nav-tab:hover{color:var(--text)}
.nav-tab.active{color:var(--a);border-bottom-color:var(--a)}
.nav-search{margin-left:auto;display:flex;align-items:center;gap:10px}
.search-box{display:flex;align-items:center;gap:8px;background:var(--s1);border:1px solid var(--border);border-radius:20px;padding:6px 14px;transition:all var(--t)}
.search-box:focus-within{border-color:var(--a);background:var(--s2)}
.search-box input{background:transparent;border:none;color:var(--text);font-family:'Outfit',sans-serif;font-size:13px;outline:none;width:180px}
.search-box input::placeholder{color:var(--text3)}
.nav-disconnect{padding:6px 14px;border-radius:var(--r-sm);border:1px solid rgba(231,76,60,.3);background:transparent;color:var(--a2);font-family:'Outfit',sans-serif;font-size:12px;font-weight:600;cursor:pointer;transition:all var(--t)}
.nav-disconnect:hover{background:rgba(231,76,60,.1)}

/* CONTENT AREA */
.content{flex:1;overflow:hidden;display:flex;flex-direction:column}

/* ── HEIM VIEW ── */
#v-heim{flex:1;overflow-y:auto}
.hero{position:relative;height:420px;overflow:hidden;flex-shrink:0}
.hero-bg{position:absolute;inset:0;background-size:cover;background-position:center;transition:opacity .6s}
.hero-grad{position:absolute;inset:0;background:linear-gradient(90deg,rgba(5,8,16,.95) 0%,rgba(5,8,16,.6) 50%,rgba(5,8,16,.2) 80%),linear-gradient(0deg,rgba(5,8,16,1) 0%,transparent 40%)}
.hero-content{position:relative;z-index:1;padding:40px 32px;height:100%;display:flex;flex-direction:column;justify-content:flex-end}
.hero-badge{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:4px;background:var(--a);color:#000;font-size:10px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:10px;width:fit-content}
.hero-title{font-size:clamp(22px,3vw,36px);font-weight:800;line-height:1.2;margin-bottom:8px;text-shadow:0 2px 20px rgba(0,0,0,.8)}
.hero-title span{color:var(--text2);font-weight:400;font-size:.7em}
.hero-desc{font-size:13px;color:var(--text2);max-width:480px;line-height:1.7;margin-bottom:16px;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.hero-meta{display:flex;align-items:center;gap:10px;margin-bottom:18px}
.hero-rating{display:flex;align-items:center;gap:4px;font-size:13px;font-weight:700;color:var(--a)}
.hero-year{font-size:12px;color:var(--text2)}
.hero-quality{padding:2px 7px;border-radius:4px;background:rgba(46,204,113,.15);border:1px solid rgba(46,204,113,.3);color:var(--a3);font-size:10px;font-weight:700}
.hero-btns{display:flex;gap:10px}
.hero-btn{display:flex;align-items:center;gap:8px;padding:10px 22px;border-radius:var(--r-sm);border:none;font-family:'Outfit',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all var(--t)}
.hero-btn.play{background:var(--text);color:#000}
.hero-btn.play:hover{background:#ddd}
.hero-btn.info{background:rgba(255,255,255,.15);color:var(--text);border:1px solid rgba(255,255,255,.2)}
.hero-btn.info:hover{background:rgba(255,255,255,.22)}
.hero-dots{position:absolute;bottom:14px;right:24px;display:flex;gap:6px;z-index:2}
.hero-dot{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,.3);cursor:pointer;transition:all var(--t)}
.hero-dot.active{background:var(--a);width:20px;border-radius:4px}

/* CATEGORY ICONS BAR */
.cat-bar{display:flex;gap:10px;padding:16px 28px;background:var(--s1);border-bottom:1px solid var(--border);overflow-x:auto;flex-shrink:0}
.cat-bar::-webkit-scrollbar{height:0}
.cat-item{display:flex;flex-direction:column;align-items:center;gap:7px;cursor:pointer;flex-shrink:0;transition:all var(--t);padding:0 6px}
.cat-item:hover .cat-ico{border-color:var(--a)}
.cat-item:hover .cat-lbl{color:var(--text)}
.cat-ico{width:52px;height:52px;border-radius:14px;background:var(--s2);border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:22px;transition:all var(--t)}
.cat-item.active .cat-ico{border-color:var(--a);background:var(--a-dim);box-shadow:0 0 14px rgba(245,197,24,.2)}
.cat-item.active .cat-lbl{color:var(--a)}
.cat-lbl{font-size:10px;font-weight:600;color:var(--text2);text-align:center;line-height:1.3;max-width:60px}

/* SECTION ROWS */
.home-sections{padding:20px 28px;display:flex;flex-direction:column;gap:24px}
.sec-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.sec-title{font-size:16px;font-weight:700}
.sec-more{font-size:12px;color:var(--a);cursor:pointer;font-weight:600}
.poster-row{display:flex;gap:12px;overflow-x:auto;padding-bottom:4px}
.poster-row::-webkit-scrollbar{height:0}
.poster-card{flex-shrink:0;width:130px;cursor:pointer;transition:all var(--t);position:relative}
.poster-card:hover{transform:scale(1.04)}
.poster-card:hover .poster-overlay{opacity:1}
.poster-img{width:130px;height:195px;border-radius:var(--r);background:var(--s2);border:1px solid var(--border);overflow:hidden;position:relative}
.poster-img img{width:100%;height:100%;object-fit:cover}
.poster-img .poster-placeholder{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:36px;background:linear-gradient(135deg,var(--s2),var(--s3))}
.poster-overlay{position:absolute;inset:0;border-radius:var(--r);background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity var(--t)}
.poster-play{width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,.9);display:flex;align-items:center;justify-content:center;font-size:16px}
.poster-name{font-size:11px;font-weight:600;margin-top:7px;line-height:1.3;color:var(--text)}
.poster-sub{font-size:10px;color:var(--text3);margin-top:2px}
.poster-badge{position:absolute;top:6px;left:6px;padding:2px 6px;border-radius:4px;font-size:9px;font-weight:700;letter-spacing:.5px;text-transform:uppercase}
.pb-live{background:var(--a2);color:#fff}
.pb-4k{background:var(--a3);color:#000}
.pb-new{background:var(--a);color:#000}

/* ── BROWSE VIEW (Filme/Serie/Sports) ── */
#v-browse{flex:1;display:none;overflow:hidden}
#v-browse.active{display:flex}
.browse-layout{display:flex;height:100%;overflow:hidden}
/* SIDEBAR */
.browse-sidebar{width:260px;flex-shrink:0;background:var(--s1);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.bsb-top{padding:16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-shrink:0}
.bsb-logo{width:48px;height:48px;border-radius:50%;background:var(--s3);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:22px}
.bsb-back{display:flex;align-items:center;gap:6px;font-size:13px;font-weight:600;color:var(--text2);cursor:pointer;transition:color var(--t);padding:5px 8px;border-radius:var(--r-sm)}
.bsb-back:hover{color:var(--text);background:var(--s2)}
.bsb-search{display:flex;align-items:center;gap:6px;font-size:13px;font-weight:600;color:var(--text2);cursor:pointer;padding:5px 8px;border-radius:var(--r-sm);transition:color var(--t)}
.bsb-search:hover{color:var(--text);background:var(--s2)}
.bsb-list{flex:1;overflow-y:auto;padding:8px}
.bsb-item{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;border-radius:var(--r-sm);cursor:pointer;transition:all var(--t);margin-bottom:2px}
.bsb-item:hover{background:var(--s2)}
.bsb-item.active{background:rgba(245,197,24,.1)}
.bsb-item.active .bsb-item-name{color:var(--a);font-weight:700}
.bsb-item-name{font-size:13px;font-weight:500;color:var(--text2)}
.bsb-item-count{font-size:11px;color:var(--text3);font-family:'DM Mono',monospace}
.bsb-item.active .bsb-item-count{color:var(--a)}
/* GRID */
.browse-main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.browse-toolbar{padding:12px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;flex-shrink:0}
.browse-sort{display:flex;align-items:center;gap:6px;background:var(--s2);border:1px solid var(--border);border-radius:var(--r-sm);padding:6px 12px;cursor:pointer;font-size:12px;color:var(--text2);transition:all var(--t)}
.browse-sort:hover{border-color:var(--border2);color:var(--text)}
.browse-total{margin-left:auto;font-size:13px;font-weight:700;color:var(--text2)}
.browse-grid-wrap{flex:1;overflow-y:auto;padding:14px 18px}
.browse-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:14px}
.grid-card{cursor:pointer;transition:all var(--t);position:relative}
.grid-card:hover{transform:translateY(-3px)}
.grid-card:hover .poster-overlay{opacity:1}
.grid-img{width:100%;aspect-ratio:2/3;border-radius:var(--r);background:var(--s2);border:1px solid var(--border);overflow:hidden;position:relative}
.grid-img img{width:100%;height:100%;object-fit:cover}
.grid-img .ph{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:32px;background:linear-gradient(135deg,var(--s2),var(--s3))}
.grid-name{font-size:11px;font-weight:600;margin-top:6px;line-height:1.3;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.grid-sub{font-size:10px;color:var(--text3);margin-top:2px}
.grid-overlay{position:absolute;inset:0;border-radius:var(--r);background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity var(--t)}
.grid-play{width:44px;height:44px;border-radius:50%;background:rgba(245,197,24,.9);display:flex;align-items:center;justify-content:center;font-size:18px}

/* ── LIVE TV VIEW ── */
#v-live{flex:1;display:none;overflow:hidden}
#v-live.active{display:flex}
.live-layout{display:flex;height:100%;overflow:hidden}
.live-sidebar{width:300px;flex-shrink:0;background:var(--s1);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.live-filter{padding:10px 12px;border-bottom:1px solid var(--border);flex-shrink:0;display:flex;gap:7px;overflow-x:auto}
.live-filter::-webkit-scrollbar{height:0}
.lf-btn{padding:5px 12px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--text2);font-family:'Outfit',sans-serif;font-size:11px;font-weight:600;cursor:pointer;transition:all var(--t);white-space:nowrap;flex-shrink:0}
.lf-btn.active{background:var(--a);color:#000;border-color:var(--a)}
.lf-btn:not(.active):hover{border-color:var(--border2);color:var(--text)}
.live-list{flex:1;overflow-y:auto}
.live-ch-item{display:flex;align-items:center;gap:12px;padding:10px 14px;cursor:pointer;border-bottom:1px solid var(--border);transition:all var(--t)}
.live-ch-item:hover{background:var(--s2)}
.live-ch-item.active{background:rgba(245,197,24,.08);border-left:3px solid var(--a)}
.lci-logo{width:38px;height:38px;border-radius:8px;background:var(--s2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;overflow:hidden}
.lci-logo img{width:100%;height:100%;object-fit:cover;border-radius:8px}
.lci-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lci-group{font-size:10px;color:var(--text3);margin-top:2px}
.lci-live{width:7px;height:7px;border-radius:50%;background:var(--a2);flex-shrink:0;box-shadow:0 0 6px var(--a2)}
.lci-live.on{background:var(--a3);box-shadow:0 0 6px var(--a3)}
.live-main{flex:1;display:flex;flex-direction:column;overflow:hidden;background:#000}
.live-player-wrap{flex:1;position:relative;background:#000;display:flex;align-items:center;justify-content:center;overflow:hidden}
.live-player-wrap video{width:100%;height:100%;object-fit:contain}
.live-no-ch{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:14px;color:var(--text2);text-align:center}
.live-no-ch .ico{font-size:60px;opacity:.15}
.live-no-ch h3{font-size:18px;font-weight:700;opacity:.35}
.live-no-ch p{font-size:13px;opacity:.5;max-width:240px;line-height:1.7}
.live-info-bar{padding:12px 18px;border-top:1px solid var(--border);background:var(--s1);display:flex;align-items:center;gap:16px;flex-shrink:0}
.lib-logo{width:36px;height:36px;border-radius:8px;background:var(--s2);display:flex;align-items:center;justify-content:center;font-size:16px;overflow:hidden;flex-shrink:0}
.lib-logo img{width:100%;height:100%;object-fit:cover;border-radius:8px}
.lib-name{font-size:14px;font-weight:700}
.lib-status{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--a3);margin-top:2px}
.lib-ctrls{display:flex;align-items:center;gap:8px;margin-left:auto}
.lib-ctrl{width:34px;height:34px;border-radius:50%;background:var(--s2);border:1px solid var(--border);color:var(--text);font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all var(--t)}
.lib-ctrl:hover{border-color:var(--a);color:var(--a)}
.lib-ctrl.big{width:40px;height:40px;font-size:16px}
.lib-ctrl.active{background:var(--a);color:#000;border-color:var(--a)}
.lib-vol{display:flex;align-items:center;gap:6px}
.vol-ico{font-size:14px;color:var(--text2);cursor:pointer}
input[type=range].vol{-webkit-appearance:none;width:80px;height:3px;background:var(--border2);border-radius:2px;outline:none;cursor:pointer}
input[type=range].vol::-webkit-slider-thumb{-webkit-appearance:none;width:13px;height:13px;border-radius:50%;background:var(--a)}

/* TOAST */
.toast{position:fixed;bottom:20px;right:20px;z-index:999;padding:10px 16px;border-radius:var(--r);display:flex;align-items:center;gap:8px;font-size:13px;font-weight:500;border:1px solid var(--border2);background:var(--s1);box-shadow:var(--shadow);transition:all .3s;pointer-events:none}
.toast.success{border-color:var(--a3);color:var(--a3)}
.toast.error{border-color:var(--a2);color:var(--a2)}
.toast.info{border-color:var(--a);color:var(--a)}
.toast.hide{opacity:0;transform:translateY(8px)}

/* DETAIL MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(6px)}
.detail-modal{background:var(--s1);border:1px solid var(--border2);border-radius:var(--r-lg);width:100%;max-width:600px;overflow:hidden;animation:modalUp .25s ease}
@keyframes modalUp{from{transform:translateY(16px);opacity:0}to{transform:translateY(0);opacity:1}}
.dm-hero{height:200px;background-size:cover;background-position:center;position:relative}
.dm-hero-grad{position:absolute;inset:0;background:linear-gradient(0deg,var(--s1),transparent 60%)}
.dm-close{position:absolute;top:10px;right:10px;width:30px;height:30px;border-radius:50%;background:rgba(0,0,0,.6);border:1px solid rgba(255,255,255,.15);color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all var(--t)}
.dm-close:hover{background:rgba(231,76,60,.6)}
.dm-body{padding:20px 24px}
.dm-title{font-size:20px;font-weight:800;margin-bottom:4px}
.dm-meta{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.dm-desc{font-size:13px;color:var(--text2);line-height:1.7;margin-bottom:16px}
.dm-btns{display:flex;gap:10px}
.dm-btn{display:flex;align-items:center;gap:7px;padding:10px 20px;border-radius:var(--r-sm);border:none;font-family:'Outfit',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all var(--t)}
.dm-btn.play{background:var(--text);color:#000}
.dm-btn.play:hover{background:#ddd}
.dm-btn.fav{background:var(--s2);color:var(--text);border:1px solid var(--border)}
.dm-btn.fav:hover{border-color:var(--a);color:var(--a)}

/* LOADING */
.loading-overlay{position:fixed;inset:0;background:var(--bg);z-index:300;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px}
.loading-spinner{width:44px;height:44px;border:3px solid var(--border2);border-top-color:var(--a);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-txt{font-size:14px;color:var(--text2);font-weight:500}

/* MOBILE */
@media(max-width:700px){
  .browse-sidebar{display:none}
  .live-sidebar{width:100%;position:fixed;top:56px;left:0;right:0;z-index:40;height:50vh;border-bottom:1px solid var(--border)}
  .live-sidebar.mob-hidden{display:none}
  .live-main{flex:1}
  .nav-tabs .nav-tab span{display:none}
}
</style>
</head>
<body>

<!-- TOAST -->
<div class="toast hide" id="toast"></div>

<!-- CONNECT SCREEN -->
<div class="screen active" id="s-connect">
  <div class="connect-wrap">
    <div class="connect-logo">
      <div class="connect-logo-icon">🎬</div>
      <div class="connect-logo-name">IPTV-PREMIUM</div>
    </div>
    <div class="connect-title">Server verbinden</div>
    <div class="connect-sub">Gib deine IPTV-Zugangsdaten ein um loszulegen.</div>
    <div class="type-tabs">
      <button class="type-tab active" id="tt-M3U" onclick="setType('M3U')">📋 M3U URL</button>
      <button class="type-tab" id="tt-Xtream" onclick="setType('Xtream')">⚡ Xtream</button>
      <button class="type-tab" id="tt-Stalker" onclick="setType('Stalker')">🔮 Stalker</button>
    </div>
    <div class="c-form">
      <div id="cf-M3U">
        <div class="field"><label>Playlist-URL *</label><input id="inp-url" placeholder="http://server.com/get.php?username=...&type=m3u_plus"/></div>
      </div>
      <div id="cf-Xtream" style="display:none">
        <div class="row2" style="margin-bottom:12px">
          <div class="field"><label>Host *</label><input id="inp-host" placeholder="iptv.server.com"/></div>
          <div class="field"><label>Port</label><input id="inp-port" value="8080" placeholder="8080"/></div>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
          <div class="field"><label>Benutzername *</label><input id="inp-user" placeholder="user123"/></div>
          <div class="field"><label>Passwort *</label><input id="inp-pass" type="password" placeholder="••••••"/></div>
        </div>
      </div>
      <div id="cf-Stalker" style="display:none">
        <div class="field" style="margin-bottom:12px"><label>Portal-URL *</label><input id="inp-portal" placeholder="http://portal.iptv.com/stalker_portal/c/"/></div>
        <div class="field"><label>MAC-Adresse *</label><input id="inp-mac" placeholder="00:1A:79:XX:XX:XX"/></div>
      </div>
      <div class="hr"></div>
      <div class="field"><label>Anzeigename (optional)</label><input id="inp-name" placeholder="Mein IPTV"/></div>
      <div id="progWrap" style="display:none"><div class="prog-bar"><div class="prog-fill" id="progFill"></div></div></div>
      <div class="log-box" id="connLog" style="display:none"></div>
      <button class="btn-main" id="connectBtn" onclick="doConnect()">▶ Verbinden</button>

</div>

<!-- MAIN APP SCREEN -->
<div class="screen" id="s-app">
  <!-- TOP NAV -->
  <div class="topnav">
    <div class="nav-logo">
      <div class="nav-logo-ico">🎬</div>
      <div class="nav-logo-txt">IPTV-PREMIUM</div>
    </div>
    <div class="nav-tabs">
      <div class="nav-tab active" id="nt-heim" onclick="switchView('heim')">Heim</div>
      <div class="nav-tab" id="nt-live" onclick="switchView('live')">Live Fernsehen</div>
      <div class="nav-tab" id="nt-filme" onclick="switchView('browse','Filme')">Filme</div>
      <div class="nav-tab" id="nt-serie" onclick="switchView('browse','Serie')">Serie</div>
    </div>
    <div class="nav-search">
      <div class="search-box">
        <span style="font-size:14px;color:var(--text3)">🔍</span>
        <input id="globalSearch" placeholder="Suchen…" oninput="globalSearchFn(this.value)"/>
      </div>
      <button class="nav-disconnect" onclick="disconnectApp()">⏻ Trennen</button>
    </div>
  </div>

  <!-- HEIM VIEW -->
  <div id="v-heim" style="flex:1;overflow-y:auto;display:flex;flex-direction:column">
    <!-- HERO -->
    <div class="hero" id="hero">
      <div class="hero-bg" id="heroBg"></div>
      <div class="hero-grad"></div>
      <div class="hero-content">
        <div class="hero-badge" id="heroBadge">🔴 LIVE</div>
        <div class="hero-title" id="heroTitle">Willkommen</div>
        <div class="hero-desc" id="heroDesc">Wähle einen Kanal aus um zu starten.</div>
        <div class="hero-meta">
          <div class="hero-rating" id="heroRating">★ –</div>
          <div class="hero-year" id="heroYear"></div>
          <div class="hero-quality" id="heroQ" style="display:none"></div>
        </div>
        <div class="hero-btns">
          <button class="hero-btn play" id="heroPlayBtn" onclick="heroPlay()">▶ Abspielen</button>
          <button class="hero-btn info" onclick="heroInfo()">ℹ Info</button>
        </div>
      </div>
      <div class="hero-dots" id="heroDots"></div>
    </div>
    <!-- CATEGORY BAR -->
    <div class="cat-bar" id="catBar"></div>
    <!-- SECTIONS -->
    <div class="home-sections" id="homeSections"></div>
  </div>

  <!-- LIVE TV VIEW -->
  <div id="v-live" style="flex:1;overflow:hidden;display:none">
    <div class="live-layout">
      <div class="live-sidebar">
        <div class="live-filter" id="liveFilter"></div>
        <div class="live-list" id="liveList"></div>
      </div>
      <div class="live-main">
        <div class="live-player-wrap" id="livePlayerWrap">
          <div class="live-no-ch" id="liveNoCh">
            <div class="ico">📺</div>
            <h3>Kein Kanal ausgewählt</h3>
            <p>Wähle links einen Kanal aus.</p>
          </div>
          <video id="liveVideo" class="video-js" style="display:none;width:100%;height:100%"></video>
        </div>
        <div class="live-info-bar" id="liveInfoBar" style="display:none">
          <div class="lib-logo" id="libLogo"></div>
          <div>
            <div class="lib-name" id="libName"></div>
            <div class="lib-status"><div style="width:6px;height:6px;border-radius:50%;background:var(--a3);box-shadow:0 0 6px var(--a3)"></div>Live</div>

            <button class="lib-ctrl" onclick="livePrev()">⏮</button>
            <button class="lib-ctrl big active" id="livePPBtn" onclick="liveTogglePause()">⏸</button>

  <!-- BROWSE VIEW (Filme / Serie) -->
  <div id="v-browse" style="flex:1;overflow:hidden;display:none">
    <div class="browse-layout">
      <div class="browse-sidebar">
        <div class="bsb-top">
          <div class="bsb-logo" id="bsbLogo">🎬</div>
          <div class="bsb-back" onclick="switchView('heim')">← Zurück</div>
          <div class="bsb-search" style="margin-left:auto">🔍 Suche</div>

        <div class="bsb-list" id="bsbList"></div>
      </div>
      <div class="browse-main">
        <div class="browse-toolbar">
          <div class="browse-sort" onclick="cycleSortBrowse()">
            <span id="sortLabel">nach Hinzugefügt</span>
            <span style="font-size:12px">▾</span>

<!-- DETAIL MODAL -->
<div class="modal-bg" id="detailModal" style="display:none" onclick="if(event.target===this)closeDetail()">
  <div class="detail-modal">
    <div class="dm-hero" id="dmHero">
      <div class="dm-hero-grad"></div>
      <button class="dm-close" onclick="closeDetail()">✕</button>
    </div>
    <div class="dm-body">
      <div class="dm-title" id="dmTitle"></div>
      <div class="dm-meta" id="dmMeta"></div>
      <div class="dm-desc" id="dmDesc"></div>
      <div class="dm-btns">
        <button class="dm-btn play" onclick="playFromDetail()">▶ Abspielen</button>
        <button class="dm-btn fav" onclick="favFromDetail()">☆ Merkliste</button>
      </div>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════
let channels = [];
let liveChannels = [];
let movieChannels = [];
let seriesChannels = [];
let activeServer = null;
let vjsPlayer = null;
let livePlaying = null;
let livePaused = false;
let muted = false;
let currentView = 'heim';
let browseMode = 'Filme';
let browseCategory = 'ALL';
let sortMode = 0;
let heroIndex = 0;
let heroTimer = null;
let detailChannel = null;
let heroChannels = [];
let liveFilterGroup = 'Alle';
let favorites = JSON.parse(localStorage.getItem('ip_favs') || '[]');
let formType = 'M3U';

const SORT_LABELS = ['nach Hinzugefügt','A – Z','Z – A','nach Bewertung'];

// ═══════════════════════════════════════════════════════
// CONNECT FORM
// ═══════════════════════════════════════════════════════
function setType(t) {
  formType = t;
  ['M3U','Xtream','Stalker'].forEach(x => {
    document.getElementById('tt-'+x).classList.toggle('active', x===t);
    document.getElementById('cf-'+x).style.display = x===t?'block':'none';
  });
}

function sleep(ms){return new Promise(r=>setTimeout(r,ms))}

function addLog(msg, type='info') {
  const box = document.getElementById('connLog');
  box.style.display='flex';
  const d=new Date();
  const ts=[d.getHours(),d.getMinutes(),d.getSeconds()].map(n=>String(n).padStart(2,'0')).join(':');
  const cls={ok:'lo',error:'le',info:'li'}[type]||'li';
  const row=document.createElement('div');
  row.className='log-row';
  row.innerHTML=`<span class="lt">${ts}</span><span class="${cls}">${msg}</span>`;
  box.appendChild(row);
  box.scrollTop=9999;
}

function setProgress(p) { document.getElementById('progFill').style.width = p+'%'; }

async function doConnect() {
  const btn = document.getElementById('connectBtn');
  let target = formType==='M3U' ? document.getElementById('inp-url').value.trim()
             : formType==='Stalker' ? document.getElementById('inp-portal').value.trim()
             : document.getElementById('inp-host').value.trim();
  if (!target) { toast('Bitte Serveradresse eingeben','error'); return; }
  btn.disabled=true; btn.textContent='⏳ Verbinde…';
  document.getElementById('progWrap').style.display='block';
  document.getElementById('connLog').innerHTML='';
  try {
    let fetched=[];
    if (formType==='M3U') {
      addLog('M3U wird geladen…');
      setProgress(20);
      let text=null;
      try { const r=await fetch(target); if(!r.ok)throw 0; text=await r.text(); }
      catch { addLog('CORS-Proxy wird versucht…','info'); setProgress(40);
        try { const r2=await fetch('https://corsproxy.io/?'+encodeURIComponent(target)); if(!r2.ok)throw new Error('HTTP '+r2.status); text=await r2.text(); }
        catch(e2){throw new Error('Playlist konnte nicht geladen werden')} }
      setProgress(70); addLog('Wird geparst…');
      fetched=parseM3U(text);
      if (!fetched.length) throw new Error('Keine Kanäle gefunden');
      setProgress(100); addLog(fetched.length+' Kanäle geladen.','ok');
    } else if (formType==='Xtream') {
      const host=document.getElementById('inp-host').value.trim();
      const port=document.getElementById('inp-port').value.trim()||'80';
      const user=document.getElementById('inp-user').value.trim();
      const pass=document.getElementById('inp-pass').value.trim();
      if (!user||!pass) throw new Error('Benutzername und Passwort erforderlich');
      addLog('Xtream API: Authentifizierung…');
      setProgress(25);
      const apiUrl=`http://${host}:${port}/player_api.php?username=${encodeURIComponent(user)}&password=${encodeURIComponent(pass)}`;
      let data;
      try { const r=await fetch(apiUrl); data=await r.json(); }
      catch { const r2=await fetch('https://corsproxy.io/?'+encodeURIComponent(apiUrl)); data=await r2.json(); }
      if (!data.user_info||data.user_info.auth==0) throw new Error('Ungültige Zugangsdaten');
      addLog('Angemeldet: '+data.user_info.username,'ok');
      setProgress(55); addLog('Kanäle werden geladen…');
      const liveUrl=`http://${host}:${port}/player_api.php?username=${encodeURIComponent(user)}&password=${encodeURIComponent(pass)}&action=get_live_streams`;
      let lr; try { lr=await fetch(liveUrl); } catch { lr=await fetch('https://corsproxy.io/?'+encodeURIComponent(liveUrl)); }
      const liveData=await lr.json();
      fetched=liveData.map((ch,i)=>({id:i+1,name:ch.name||'Kanal '+(i+1),group:ch.category_name||'Live',logo:ch.stream_icon||'',url:`http://${host}:${port}/live/${encodeURIComponent(user)}/${encodeURIComponent(pass)}/${ch.stream_id}.m3u8`,type:'live',quality:'HD'}));
      setProgress(100); addLog(fetched.length+' Kanäle geladen.','ok');
      target=host+':'+port;
    }
    const name=document.getElementById('inp-name').value.trim()||target;
    activeServer={name,host:target,type:formType};
    channels=fetched;
    await sleep(400);
    launchApp();
  } catch(err) {
    addLog('Fehler: '+err.message,'error');
    toast(err.message,'error');
    btn.disabled=false; btn.textContent='▶ Verbinden';
    setProgress(0);
  }
}

// ═══════════════════════════════════════════════════════
// M3U PARSER
// ═══════════════════════════════════════════════════════
function parseM3U(text) {
  const lines=text.split('\n').map(l=>l.trim()).filter(Boolean);
  const result=[]; let cur=null;
  for (const line of lines) {
    if (line.startsWith('#EXTINF:')) {
      cur={id:result.length+1,name:'',group:'Allgemein',logo:'',url:'',type:'live',quality:'HD'};
      const nm=line.match(/,(.+)$/); if(nm) cur.name=nm[1].trim();
      const gr=line.match(/group-title="([^"]*)"/i); if(gr) cur.group=gr[1].trim()||'Allgemein';
      const lo=line.match(/tvg-logo="([^"]*)"/i); if(lo) cur.logo=lo[1].trim();
      // classify
      const g=cur.group.toLowerCase();
      if (/film|movie|vod|kino/i.test(g)) cur.type='movie';
      else if (/serie|series|show|tv show/i.test(g)) cur.type='series';
      else cur.type='live';
      if (/4K|UHD/i.test(cur.name)) cur.quality='4K';
      else if (/FHD|1080/i.test(cur.name)) cur.quality='FHD';
      else cur.quality='HD';
    } else if (line&&!line.startsWith('#')&&cur) {
      cur.url=line; result.push(cur); cur=null;
    }
  }
  return result;
}

// ═══════════════════════════════════════════════════════
// LAUNCH APP
// ═══════════════════════════════════════════════════════
function launchApp() {
  liveChannels=channels.filter(c=>c.type==='live');
  movieChannels=channels.filter(c=>c.type==='movie');
  seriesChannels=channels.filter(c=>c.type==='series');
  // if no movies/series detected, treat all as live
  if (!liveChannels.length) liveChannels=[...channels];

  document.getElementById('s-connect').classList.remove('active');
  document.getElementById('s-app').classList.add('active');
  switchView('heim');
  toast('Verbunden – '+channels.length+' Kanäle geladen','success');
}

function disconnectApp() {
  if (vjsPlayer) { try{vjsPlayer.pause();vjsPlayer.src('');}catch(e){} }
  clearInterval(heroTimer);
  channels=[]; liveChannels=[]; movieChannels=[]; seriesChannels=[];
  activeServer=null; livePlaying=null;
  document.getElementById('s-app').classList.remove('active');
  document.getElementById('s-connect').classList.add('active');
  document.getElementById('connectBtn').disabled=false;
  document.getElementById('connectBtn').textContent='▶ Verbinden';
  document.getElementById('progWrap').style.display='none';
  toast('Getrennt','info');
}

// ═══════════════════════════════════════════════════════
// VIEW SWITCHING
// ═══════════════════════════════════════════════════════
function switchView(view, subMode) {
  currentView=view;
  ['heim','live','browse'].forEach(v => {
    document.getElementById('v-'+v).style.display='none';
  });
  document.getElementById('v-'+view).style.display='flex';
  // nav tab highlight
  document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'));
  const ntMap={heim:'nt-heim',live:'nt-live',browse:subMode==='Filme'?'nt-filme':'nt-serie'};
  const ni=document.getElementById(ntMap[view]);
  if(ni) ni.classList.add('active');

  if (view==='heim') buildHeim();
  else if (view==='live') buildLive();
  else if (view==='browse') { browseMode=subMode||browseMode; browseCategory='ALL'; buildBrowse(); }
}

// ═══════════════════════════════════════════════════════
// HEIM VIEW
// ═══════════════════════════════════════════════════════
function buildHeim() {
  clearInterval(heroTimer);
  // Hero: pick interesting channels (with logos first)
  const pool=(liveChannels.length?liveChannels:channels).filter(c=>c.logo).slice(0,10);
  heroChannels=pool.length>=3?pool:(liveChannels.length?liveChannels:channels).slice(0,8);
  heroIndex=0;
  buildHeroDots();
  showHero(0);
  if (heroChannels.length>1) heroTimer=setInterval(()=>{ heroIndex=(heroIndex+1)%heroChannels.length; showHero(heroIndex); },6000);

  // Category bar
  buildCatBar();
  // Sections
  buildSections();
}

function showHero(i) {
  if (!heroChannels.length) return;
  const ch=heroChannels[i];
  heroIndex=i;
  document.getElementById('heroBg').style.background=ch.logo?`url(${ch.logo}) center/cover`:'linear-gradient(135deg,#1a1040,#050810)';
  document.getElementById('heroTitle').textContent=ch.name;
  document.getElementById('heroDesc').textContent=ch.group+' · LIVE';
  document.getElementById('heroBadge').textContent='🔴 LIVE';
  document.getElementById('heroRating').textContent='★ LIVE';
  document.getElementById('heroYear').textContent=ch.group;
  const hq=document.getElementById('heroQ');
  hq.style.display='block'; hq.textContent=ch.quality;
  // dots
  document.querySelectorAll('.hero-dot').forEach((d,di)=>d.classList.toggle('active',di===i));
}

function buildHeroDots() {
  const el=document.getElementById('heroDots');
  el.innerHTML=heroChannels.slice(0,8).map((_,i)=>
    `<div class="hero-dot ${i===0?'active':''}" onclick="showHero(${i})"></div>`).join('');
}

function buildCatBar() {
  const groups=[...new Set(channels.map(c=>c.group))].filter(Boolean).slice(0,12);
  const items=[
    {label:'Live TV',icon:'📺',filter:'live'},
    {label:'Filme',icon:'🎬',filter:'movie'},
    {label:'Serien',icon:'🎭',filter:'series'},
    {label:'Sports',icon:'⚽',filter:'sports'},
    ...groups.filter(g=>!['live','movie','series'].includes(g.toLowerCase())).slice(0,8).map(g=>({label:g,icon:'📡',filter:g})),
  ];
  document.getElementById('catBar').innerHTML=items.map((it,i)=>
    `<div class="cat-item ${i===0?'active':''}" onclick="catClick(this,'${it.filter}')">
      <div class="cat-ico">${it.icon}</div>
      <div class="cat-lbl">${it.label}</div>
    </div>`).join('');
}

function catClick(el, filter) {
  document.querySelectorAll('.cat-item').forEach(c=>c.classList.remove('active'));
  el.classList.add('active');
  if (filter==='live') switchView('live');
  else if (filter==='movie') switchView('browse','Filme');
  else if (filter==='series') switchView('browse','Serie');
  else { switchView('browse','Filme'); browseCategory=filter; buildBrowse(); }
}

function buildSections() {
  const wrap=document.getElementById('homeSections');
  const sections=[];
  if (liveChannels.length) sections.push({title:'📺 Live Fernsehen',items:liveChannels.slice(0,20),type:'live'});
  if (movieChannels.length) sections.push({title:'🎬 Filme',items:movieChannels.slice(0,20),type:'movie'});
  if (seriesChannels.length) sections.push({title:'🎭 Serien',items:seriesChannels.slice(0,20),type:'series'});
  if (!sections.length) sections.push({title:'📡 Alle Kanäle',items:channels.slice(0,30),type:'live'});
  wrap.innerHTML=sections.map(s=>`
    <div>
      <div class="sec-head">
        <div class="sec-title">${s.title}</div>
        <div class="sec-more" onclick="switchView('${s.type==='live'?'live':'browse'}','${s.type==='series'?'Serie':'Filme'}')">Alle anzeigen ›</div>
      </div>
      <div class="poster-row">${s.items.map(ch=>posterCard(ch)).join('')}</div>
    </div>`).join('');
}

function posterCard(ch) {
  const isFav=favorites.includes(ch.id);
  const qbadge=ch.quality==='4K'?'pb-4k':ch.type==='live'?'pb-live':'pb-new';
  const qtext=ch.quality==='4K'?'4K':ch.type==='live'?'LIVE':'NEU';
  return `<div class="poster-card" onclick="openDetail(${ch.id})">
    <div class="poster-img">
      ${ch.logo?`<img src="${ch.logo}" onerror="this.parentElement.innerHTML='<div class=poster-placeholder>🎬</div>'" loading="lazy" alt=""/>` : '<div class="poster-placeholder">🎬</div>'}
      <div class="poster-overlay"><div class="poster-play">▶</div></div>
      <div class="poster-badge ${qbadge}">${qtext}</div>
    </div>
    <div class="poster-name">${ch.name}</div>
    <div class="poster-sub">${ch.group}</div>
  </div>`;
}

function heroPlay() {
  if (!heroChannels.length) return;
  const ch=heroChannels[heroIndex];
  if (ch.type==='live') { switchView('live'); playLiveChannel(ch.id); }
  else { openDetail(ch.id); }
}

function heroInfo() {
  if (!heroChannels.length) return;
  openDetail(heroChannels[heroIndex].id);
}

// ═══════════════════════════════════════════════════════
// LIVE TV
// ═══════════════════════════════════════════════════════
let liveVjs = null;

function buildLive() {
  buildLiveFilter();
  renderLiveList();
}

function buildLiveFilter() {
  const groups=['Alle',...new Set(liveChannels.map(c=>c.group)).values()].slice(0,10);
  document.getElementById('liveFilter').innerHTML=groups.map(g=>
    `<button class="lf-btn ${g===liveFilterGroup?'active':''}" onclick="setLiveFilter('${g.replace(/'/g,"\\'")}')">
      ${g}</button>`).join('');
}

function setLiveFilter(g) {
  liveFilterGroup=g;
  buildLiveFilter();
  renderLiveList();
}

function renderLiveList() {
  const list=liveFilterGroup==='Alle'?liveChannels:liveChannels.filter(c=>c.group===liveFilterGroup);
  document.getElementById('liveList').innerHTML=list.map(ch=>`
    <div class="live-ch-item ${livePlaying&&livePlaying.id===ch.id?'active':''}" onclick="playLiveChannel(${ch.id})">
      <div class="lci-logo">
        ${ch.logo?`<img src="${ch.logo}" onerror="this.parentElement.textContent='📺'" loading="lazy" alt=""/>` : '📺'}
      </div>
      <div style="flex:1;overflow:hidden">
        <div class="lci-name">${ch.name}</div>
        <div class="lci-group">${ch.group}</div>
      </div>
      <div class="lci-live ${livePlaying&&livePlaying.id===ch.id?'on':''}"></div>
    </div>`).join('');
}

function playLiveChannel(id) {
  const ch=(liveChannels.length?liveChannels:channels).find(c=>c.id===id);
  if (!ch||!ch.url) { toast('Kein Stream-Link','error'); return; }
  livePlaying=ch; livePaused=false;
  // Init Video.js if needed
  if (!liveVjs) {
    document.getElementById('liveVideo').style.display='block';
    document.getElementById('liveNoCh').style.display='none';
    liveVjs=videojs('liveVideo',{controls:true,autoplay:true,preload:'auto',fluid:false,html5:{vhs:{overrideNative:true},nativeVideoTracks:false,nativeAudioTracks:false}});
  }
  document.getElementById('liveNoCh').style.display='none';
  document.getElementById('liveVideo').style.display='block';
  try {
    liveVjs.src({src:ch.url,type:ch.url.includes('.m3u8')?'application/x-mpegURL':'video/mp4'});
    liveVjs.play().catch(()=>{});
  } catch(e){ toast('Stream-Fehler','error'); }
  // Info bar
  document.getElementById('liveInfoBar').style.display='flex';
  const logoEl=document.getElementById('libLogo');
  logoEl.innerHTML=ch.logo?`<img src="${ch.logo}" onerror="this.parentElement.textContent='📺'" alt=""/>` : '📺';
  document.getElementById('libName').textContent=ch.name;
  document.getElementById('livePPBtn').textContent='⏸';
  document.getElementById('livePPBtn').classList.add('active');
  renderLiveList();
}

function liveTogglePause() {
  if (!liveVjs) return;
  livePaused=!livePaused;
  livePaused?liveVjs.pause():liveVjs.play().catch(()=>{});
  document.getElementById('livePPBtn').textContent=livePaused?'▶':'⏸';
  document.getElementById('livePPBtn').classList.toggle('active',!livePaused);
}

function liveStop() {
  if (liveVjs) { try{liveVjs.pause();liveVjs.src('');}catch(e){} }
  livePlaying=null;
  document.getElementById('liveInfoBar').style.display='none';
  document.getElementById('liveNoCh').style.display='flex';
  document.getElementById('liveVideo').style.display='none';
  renderLiveList();
}

function livePrev() {
  if (!livePlaying) return;
  const list=liveFilterGroup==='Alle'?liveChannels:liveChannels.filter(c=>c.group===liveFilterGroup);
  const i=list.findIndex(c=>c.id===livePlaying.id);
  playLiveChannel(list[(i-1+list.length)%list.length].id);
}

function liveNext() {
  if (!livePlaying) return;
  const list=liveFilterGroup==='Alle'?liveChannels:liveChannels.filter(c=>c.group===liveFilterGroup);
  const i=list.findIndex(c=>c.id===livePlaying.id);
  playLiveChannel(list[(i+1)%list.length].id);
}

function setVol(v) {
  if (liveVjs) liveVjs.volume(v/100);
  document.getElementById('volIco').textContent=v==0?'🔇':v<40?'🔉':'🔊';
}

function toggleMute() {
  muted=!muted;
  if (liveVjs) liveVjs.muted(muted);
  const s=document.getElementById('volSlider');
  s.value=muted?0:80; setVol(s.value);
}

// ═══════════════════════════════════════════════════════
// BROWSE (Filme / Serie)
// ═══════════════════════════════════════════════════════
function buildBrowse() {
  const isMovie=browseMode==='Filme';
  const pool=isMovie?movieChannels:seriesChannels;
  document.getElementById('bsbLogo').textContent=isMovie?'🎬':'🎭';
  // Sidebar categories
  const groups=['ALL',...new Set(pool.map(c=>c.group))].filter(Boolean);
  document.getElementById('bsbList').innerHTML=
    `<div class="bsb-item active" id="bsb-ALL" onclick="setBrowseCat('ALL')">
      <span class="bsb-item-name">ALL</span><span class="bsb-item-count">${pool.length}</span>
    </div>`+
    groups.filter(g=>g!=='ALL').map(g=>{
      const cnt=pool.filter(c=>c.group===g).length;
      return `<div class="bsb-item" id="bsb-${g.replace(/\s/g,'_')}" onclick="setBrowseCat('${g.replace(/'/g,"\\'")}')">
        <span class="bsb-item-name">${g}</span><span class="bsb-item-count">${cnt}</span>
      </div>`;
    }).join('');
  renderBrowseGrid();
}

function setBrowseCat(g) {
  browseCategory=g;
  document.querySelectorAll('.bsb-item').forEach(el=>el.classList.remove('active'));
  const key='bsb-'+(g==='ALL'?'ALL':g.replace(/\s/g,'_'));
  const el=document.getElementById(key); if(el) el.classList.add('active');
  renderBrowseGrid();
}

function cycleSortBrowse() {
  sortMode=(sortMode+1)%SORT_LABELS.length;
  document.getElementById('sortLabel').textContent=SORT_LABELS[sortMode];
  renderBrowseGrid();
}

function renderBrowseGrid() {
  const pool=browseMode==='Filme'?movieChannels:seriesChannels;
  let list=browseCategory==='ALL'?[...pool]:pool.filter(c=>c.group===browseCategory);
  const search=document.getElementById('globalSearch').value.toLowerCase();
  if (search) list=list.filter(c=>c.name.toLowerCase().includes(search));
  if (sortMode===1) list.sort((a,b)=>a.name.localeCompare(b.name));
  else if (sortMode===2) list.sort((a,b)=>b.name.localeCompare(a.name));
  document.getElementById('browseTotal').textContent=`ALL(${list.length})`;
  document.getElementById('browseGrid').innerHTML=list.map(ch=>`
    <div class="grid-card" onclick="openDetail(${ch.id})">
      <div class="grid-img">
        ${ch.logo?`<img src="${ch.logo}" onerror="this.parentElement.innerHTML='<div class=ph>🎬</div>'" loading="lazy" alt=""/>` : '<div class="ph">🎬</div>'}
        <div class="grid-overlay"><div class="grid-play">▶</div></div>
        ${ch.quality==='4K'?'<div class="poster-badge pb-4k" style="position:absolute;top:6px;left:6px">4K</div>':''}
      </div>
      <div class="grid-name">${ch.name}</div>
      <div class="grid-sub">${ch.group}</div>
    </div>`).join('');
}

// ═══════════════════════════════════════════════════════
// DETAIL MODAL
// ═══════════════════════════════════════════════════════
function openDetail(id) {
  const ch=channels.find(c=>c.id===id);
  if (!ch) return;
  detailChannel=ch;
  document.getElementById('dmHero').style.background=ch.logo?`url(${ch.logo}) center/cover`:'linear-gradient(135deg,#1a1040,#050810)';
  document.getElementById('dmTitle').textContent=ch.name;
  document.getElementById('dmDesc').textContent=`Gruppe: ${ch.group} · Qualität: ${ch.quality}`;
  document.getElementById('dmMeta').innerHTML=
    `<span class="hero-quality">${ch.quality}</span>
     <span class="hero-year">${ch.group}</span>
     <span class="poster-badge ${ch.type==='live'?'pb-live':'pb-new'}" style="position:static;border-radius:4px">
       ${ch.type==='live'?'LIVE':ch.type==='movie'?'FILM':'SERIE'}
     </span>`;
  const favBtn=document.querySelector('.dm-btn.fav');
  favBtn.textContent=favorites.includes(ch.id)?'★ Gemerkt':'☆ Merkliste';
  document.getElementById('detailModal').style.display='flex';
}

function closeDetail() { document.getElementById('detailModal').style.display='none'; }

function playFromDetail() {
  if (!detailChannel) return;
  closeDetail();
  if (detailChannel.type==='live') { switchView('live'); playLiveChannel(detailChannel.id); }
  else {
    // For movie/series, play directly via video.js in live view as a workaround
    switchView('live');
    const fakeLive={...detailChannel,type:'live'};
    if (!liveChannels.find(c=>c.id===detailChannel.id)) liveChannels.unshift(detailChannel);
    playLiveChannel(detailChannel.id);
  }
}

function favFromDetail() {
  if (!detailChannel) return;
  if (favorites.includes(detailChannel.id)) {
    favorites=favorites.filter(f=>f!==detailChannel.id);
    toast('Aus Merkliste entfernt','info');
  } else {
    favorites.push(detailChannel.id);
    toast('Zur Merkliste hinzugefügt','success');
  }
  localStorage.setItem('ip_favs',JSON.stringify(favorites));
  const favBtn=document.querySelector('.dm-btn.fav');
  favBtn.textContent=favorites.includes(detailChannel.id)?'★ Gemerkt':'☆ Merkliste';
}

// ═══════════════════════════════════════════════════════
// GLOBAL SEARCH
// ═══════════════════════════════════════════════════════
function globalSearchFn(val) {
  if (currentView==='browse') renderBrowseGrid();
}

// ═══════════════════════════════════════════════════════
// TOAST
// ═══════════════════════════════════════════════════════
let toastTmr;
function toast(msg,type='info') {
  const el=document.getElementById('toast');
  el.className='toast '+type;
  el.innerHTML=`<span>${type==='success'?'✓':type==='error'?'✗':'ℹ'}</span> ${msg}`;
  clearTimeout(toastTmr);
  toastTmr=setTimeout(()=>el.classList.add('hide'),3500);
}

// ═══════════════════════════════════════════════════════
// KEYBOARD
// ═══════════════════════════════════════════════════════
document.addEventListener('keydown', e=>{
  if (['INPUT','TEXTAREA'].includes(document.activeElement.tagName)) return;
  if (!livePlaying) return;
  if (e.code==='Space'){e.preventDefault();liveTogglePause();}
  else if (e.code==='ArrowLeft'){e.preventDefault();livePrev();}
  else if (e.code==='ArrowRight'){e.preventDefault();liveNext();}
  else if (e.code==='Escape') liveStop();
});
</script>
</body>
</html>
