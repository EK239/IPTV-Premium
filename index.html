<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Mini Browser App</title>

<style>
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, Arial, sans-serif;
    background: #0f0f10;
    color: white;
  }

  .topbar {
    display: flex;
    gap: 10px;
    padding: 12px;
    background: #1c1c1e;
    align-items: center;
  }

  input {
    flex: 1;
    padding: 12px;
    border-radius: 12px;
    border: none;
    outline: none;
    font-size: 14px;
    background: #2c2c2e;
    color: white;
  }

  button {
    padding: 12px 14px;
    border: none;
    border-radius: 12px;
    background: #007aff;
    color: white;
    font-weight: 600;
    cursor: pointer;
  }

  button:active {
    transform: scale(0.97);
  }

  iframe {
    width: 100%;
    height: calc(100vh - 70px);
    border: none;
    background: white;
  }

  .hint {
    font-size: 12px;
    opacity: 0.6;
    padding: 0 12px 10px;
  }
</style>
</head>

<body>

<div class="topbar">
  <input id="url" placeholder="URL eingeben (z. B. google.com)" />
  <button onclick="go()">Go</button>
</div>

<div class="hint">Tipp: Ohne https wird automatisch ergänzt</div>

<iframe id="frame"></iframe>

<script>
function go() {
  let url = document.getElementById("url").value.trim();

  if (!url) return;

  if (!url.startsWith("http")) {
    url = "https://" + url;
  }

  document.getElementById("frame").src = url;
}
</script>

</body>
</html>
</html>
