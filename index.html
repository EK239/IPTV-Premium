<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>URL Viewer App</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 20px;
      background: #f2f2f2;
    }

    .container {
      max-width: 800px;
      margin: auto;
    }

    input {
      width: 75%;
      padding: 10px;
      font-size: 16px;
    }

    button {
      padding: 10px 15px;
      font-size: 16px;
      cursor: pointer;
    }

    iframe {
      width: 100%;
      height: 80vh;
      margin-top: 20px;
      border: 1px solid #ccc;
      background: white;
    }
  </style>
</head>

<body>
  <div class="container">
    <h2>URL Viewer</h2>

    <input type="text" id="urlInput" placeholder="https://example.com" />
    <button onclick="loadURL()">Öffnen</button>

    <iframe id="frame"></iframe>
  </div>

  <script>
    function loadURL() {
      let url = document.getElementById("urlInput").value;

      // einfache Validierung
      if (!url.startsWith("http")) {
        url = "https://" + url;
      }

      document.getElementById("frame").src = url;
    }
  </script>
</body>
</html>
